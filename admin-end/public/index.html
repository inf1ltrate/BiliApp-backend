<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理端 - Bilibili</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <h1>管理后台</h1>
      <nav>
        <ul>
          <li><a href="dashboard.html" class="nav-link">仪表盘</a></li>
          <li><a href="users.html" class="nav-link">用户管理</a></li>
          <li><a href="videos.html" class="nav-link">视频管理</a></li>
        </ul>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <header class="header">
        <h2>欢迎使用管理后台</h2>
        <p>这里是Bilibili视频网站的管理端，您可以在这里管理用户和视频。</p>
      </header>

      <section class="welcome-section">
        <div class="card">
          <h3>仪表盘</h3>
          <p>查看网站的统计数据和概览</p>
          <a href="dashboard.html" class="btn">进入仪表盘</a>
        </div>
        
        <div class="card">
          <h3>用户管理</h3>
          <p>管理网站的用户信息</p>
          <a href="users.html" class="btn">进入用户管理</a>
        </div>
        
        <div class="card">
          <h3>视频管理</h3>
          <p>管理网站的视频内容</p>
          <a href="videos.html" class="btn">进入视频管理</a>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
