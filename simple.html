<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilibili 视频网站</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
    }
    
    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .carousel {
      width: 100%;
      height: 300px;
      overflow: hidden;
      margin-bottom: 30px;
      position: relative;
    }
    
    .carousel-item {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    
    .carousel-item.active {
      opacity: 1;
    }
    
    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .carousel-indicators {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }
    
    .carousel-indicators span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    
    .carousel-indicators span.active {
      background-color: white;
    }
    
    .carousel-adv {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      padding: 10px;
      font-size: 18px;
    }
    
    .video-list h2 {
      margin-bottom: 20px;
      font-size: 24px;
    }
    
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    
    .video-item {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    
    .video-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }
    
    .video-thumbnail {
      width: 100%;
      height: 200px;
      overflow: hidden;
    }
    
    .video-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .video-info {
      padding: 15px;
    }
    
    .video-info h3 {
      margin-bottom: 5px;
      font-size: 16px;
    }
    
    .video-info p {
      color: #666;
      font-size: 14px;
    }
    
    .login-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }
    
    .login-btn a {
      display: inline-block;
      padding: 8px 16px;
      background-color: #00a1d6;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }
    
    .login-btn a:hover {
      background-color: #0081b3;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app">
      <h1>Bilibili 视频网站</h1>
      
      <!-- 轮播图 -->
      <div class="carousel" v-if="carousels.length > 0">
        <div class="carousel-item" v-for="(carousel, index) in carousels" :key="carousel.id" :class="{ active: index === currentIndex }">
          <img :src="'https://picsum.photos/800/400?random=' + carousel.id" :alt="carousel.adv" />
          <div class="carousel-adv">{{ carousel.adv }}</div>
        </div>
        <!-- 轮播指示器 -->
        <div class="carousel-indicators">
          <span v-for="(carousel, index) in carousels" :key="carousel.id" :class="{ active: index === currentIndex }" @click="currentIndex = index"></span>
        </div>
      </div>

      <!-- 视频列表 -->
      <div class="video-list">
        <h2>视频列表</h2>
        <div class="video-grid">
          <div class="video-item" v-for="video in videos" :key="video.id" @click="alert('视频ID: ' + video.id)">
            <div class="video-thumbnail">
              <img :src="'https://picsum.photos/300/200?random=' + video.id" :alt="video.name" />
            </div>
            <div class="video-info">
              <h3>{{ video.name }}</h3>
              <p>{{ video.author }}</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 登录按钮 -->
      <div class="login-btn">
        <a href="#" @click.prevent="alert('登录功能')">登录</a>
      </div>
    </div>
  </div>
  
  <script>
    const { createApp } = Vue;
    
    // 模拟数据
    const mockCarousels = [
      { id: 1, pic: '', adv: '热门视频推荐' },
      { id: 2, pic: '', adv: '新番上线' },
      { id: 3, pic: '', adv: '活动专区' }
    ];
    
    const mockVideos = [
      { id: 1, name: 'Vue 3 入门教程', author: '前端技术' },
      { id: 2, name: 'JavaScript 高级编程', author: '编程学习' },
      { id: 3, name: 'CSS 动画效果', author: '设计爱好者' },
      { id: 4, name: 'React 实战项目', author: '前端开发' }
    ];
    
    createApp({
      data() {
        return {
          carousels: mockCarousels,
          videos: mockVideos,
          currentIndex: 0
        };
      },
      mounted() {
        // 启动轮播
        this.startCarousel();
      },
      methods: {
        startCarousel() {
          setInterval(() => {
            this.currentIndex = (this.currentIndex + 1) % this.carousels.length;
          }, 3000);
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
